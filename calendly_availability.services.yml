services:
  logger.channel.calendly_availability:
    parent: logger.channel_base
    arguments: ['calendly_availability']

  calendly_availability.stats_collector:
    class: Drupal\calendly_availability\Service\CalendlyStatsCollector
    arguments:
      - '@http_client'
      - '@logger.channel.calendly_availability'
      - '@date.formatter'
      - '@datetime.time'
      - '@config.factory'
      - '@entity_type.manager'

  calendly_availability.alerts:
    class: Drupal\calendly_availability\Service\CalendlyAlertService
    arguments:
      - '@config.factory'
      - '@state'
      - '@plugin.manager.mail'
      - '@http_client'
      - '@logger.channel.calendly_availability'

  calendly_availability.token_manager:
    class: Drupal\calendly_availability\Service\CalendlyTokenManager
    arguments:
      - '@config.factory'
      - '@state'
      - '@lock'
      - '@http_client'
      - '@logger.channel.calendly_availability'
      - '@calendly_availability.alerts'
