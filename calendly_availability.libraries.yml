calendly_availability:
  css:
    theme:
      css/calendly_availability.css: {}

calendly_widget:
  js:
    https://assets.calendly.com/assets/external/widget.js: { type: external, attributes: { async: true, defer: true } }
  css:
    theme:
      https://assets.calendly.com/assets/external/widget.css: { type: external }

# Schedule-popup enhancements: open to the selected month, prefill the member's
# details, and hand off to the next step after booking.
schedule:
  js:
    js/calendly_schedule.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - calendly_availability/calendly_widget
    - calendly_availability/calendly_availability

stats:
  css:
    theme:
      css/calendly_stats.css: {}
